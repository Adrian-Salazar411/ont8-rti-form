<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ONT8 — RTI / Singles Entry</title>
<style>
  :root {
    --bg:        #0d1117;
    --surface:   #161b22;
    --border:    #30363d;
    --accent:    #238636;
    --accent-hi: #2ea043;
    --danger:    #da3633;
    --text:      #e6edf3;
    --muted:     #7d8590;
    --label:     #8b949e;
    --input-bg:  #0d1117;
    --radius:    6px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px 12px 20px;
  }

  .header { width: 100%; max-width: 480px; margin-bottom: 10px; }

  .site-tag {
    font-family: Consolas, 'Courier New', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent-hi);
  }

  .title {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
    margin-top: 2px;
  }

  .shift-badge {
    margin-top: 6px;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 5px 10px;
    font-family: Consolas, 'Courier New', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .shift-badge .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent-hi);
    flex-shrink: 0;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.35; }
  }

  .shift-badge strong { color: var(--text); font-weight: 500; }

  .card {
    width: 100%;
    max-width: 480px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .field {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  .field:last-child { border-bottom: none; }

  .field label {
    display: block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--label);
    margin-bottom: 8px;
  }

  .field label .req { color: var(--danger); margin-left: 2px; }

  .pills { display: flex; flex-wrap: wrap; gap: 6px; }
  .pill input[type="radio"] { display: none; }

  .pill label {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px 16px;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: Consolas, 'Courier New', monospace;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s ease;
    margin-bottom: 0;
    min-width: 54px;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .pill input[type="radio"]:checked + label {
    background: var(--accent);
    border-color: var(--accent-hi);
    color: #fff;
  }

  .pill label:active { transform: scale(0.96); }

  .text-input {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: Consolas, 'Courier New', monospace;
    font-size: 14px;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
    appearance: none;
  }

  .text-input:focus { border-color: var(--accent-hi); }
  .text-input::placeholder { color: var(--border); }

  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
  input[type="number"] { -moz-appearance: textfield; }

  .submit-wrap { width: 100%; max-width: 480px; margin-top: 10px; }

  .btn-submit {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    color: #fff;
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
    letter-spacing: 0.02em;
  }

  .btn-submit:active { transform: scale(0.98); }
  .btn-submit:disabled {
    background: var(--border);
    color: var(--muted);
    cursor: not-allowed;
    transform: none;
  }

  .status {
    width: 100%;
    max-width: 480px;
    margin-top: 8px;
    padding: 12px 14px;
    border-radius: var(--radius);
    font-size: 12px;
    font-family: Consolas, 'Courier New', monospace;
    display: none;
    line-height: 1.5;
  }

  .status.success {
    background: #0f2a1a;
    border: 1px solid var(--accent);
    color: #3fb950;
    display: block;
  }

  .status.error {
    background: #2a0f0f;
    border: 1px solid var(--danger);
    color: #f85149;
    display: block;
  }

  .field.invalid .text-input { border-color: var(--danger); }
  .field.invalid .pills .pill label { border-color: var(--danger); }

  .footer {
    margin-top: 10px;
    font-size: 10px;
    color: var(--muted);
    font-family: Consolas, 'Courier New', monospace;
    letter-spacing: 0.05em;
    text-align: center;
  }
</style>
</head>
<body>

<div class="header">
  <span class="site-tag">ONT8 · IXD Quality</span>
  <h1 class="title">RTI / Singles Entry</h1>
  <div class="shift-badge">
    <span class="dot"></span>
    <span id="shift-display">Loading…</span>
  </div>
</div>

<div class="card">
  <div class="field" id="field-quarter">
    <label>Quarter <span class="req">*</span></label>
    <div class="pills">
      <div class="pill"><input type="radio" name="quarter" id="q1" value="Q1"><label for="q1">Q1</label></div>
      <div class="pill"><input type="radio" name="quarter" id="q2" value="Q2"><label for="q2">Q2</label></div>
      <div class="pill"><input type="radio" name="quarter" id="q3" value="Q3"><label for="q3">Q3</label></div>
      <div class="pill"><input type="radio" name="quarter" id="q4" value="Q4"><label for="q4">Q4</label></div>
    </div>
  </div>

  <div class="field" id="field-pole">
    <label>Pole Location <span class="req">*</span></label>
    <input class="text-input" type="text" id="pole-location"
           placeholder="e.g. H09, Lane 214, K17…"
           autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false">
  </div>

  <div class="field" id="field-category">
    <label>Category <span class="req">*</span></label>
    <div class="pills">
      <div class="pill"><input type="radio" name="category" id="cat-rti"     value="RTI"    ><label for="cat-rti"    >RTI</label></div>
      <div class="pill"><input type="radio" name="category" id="cat-ar"      value="AR"     ><label for="cat-ar"     >AR</label></div>
      <div class="pill"><input type="radio" name="category" id="cat-singles" value="Singles"><label for="cat-singles">Singles</label></div>
    </div>
  </div>

  <div class="field" id="field-count">
    <label>Pallet Count <span class="req">*</span></label>
    <input class="text-input" type="number" id="pallet-count"
           placeholder="0" min="0" inputmode="numeric">
  </div>
</div>

<div class="submit-wrap">
  <button class="btn-submit" id="btn-submit">Submit Entry</button>
</div>

<div class="status" id="status-msg"></div>
<div class="footer">Submissions go directly to the RTI Singles list</div>

<script>
// ── Shift detection — UTC offset approach, no toLocaleString ─────────────────
// Pacific Standard Time = UTC-8, Pacific Daylight Time = UTC-7
// DST: second Sunday in March → first Sunday in November
function isPDT(now) {
  const y = now.getUTCFullYear();
  // Second Sunday in March
  const mar = new Date(Date.UTC(y, 2, 1));
  const dstStart = new Date(Date.UTC(y, 2, 8 + (7 - mar.getUTCDay()) % 7));
  dstStart.setUTCHours(10); // 02:00 PST = 10:00 UTC
  // First Sunday in November
  const nov = new Date(Date.UTC(y, 10, 1));
  const dstEnd = new Date(Date.UTC(y, 10, (7 - nov.getUTCDay()) % 7 + 1));
  dstEnd.setUTCHours(9); // 02:00 PDT = 09:00 UTC
  return now >= dstStart && now < dstEnd;
}

function getPacific(now) {
  const offsetHours = isPDT(now) ? -7 : -8;
  const pac = new Date(now.getTime() + offsetHours * 3600000);
  const yyyy = pac.getUTCFullYear();
  const mm   = String(pac.getUTCMonth() + 1).padStart(2, '0');
  const dd   = String(pac.getUTCDate()).padStart(2, '0');
  return { dateStr: `${yyyy}-${mm}-${dd}`, hour: pac.getUTCHours() };
}

function computeShift() {
  const now = new Date();
  const { dateStr, hour } = getPacific(now);
  let shiftKey, shiftDate;
  if (hour >= 17) {
    shiftKey = 'Night'; shiftDate = dateStr;
  } else if (hour >= 6) {
    shiftKey = 'Day'; shiftDate = dateStr;
  } else {
    // post-midnight — still on last night's shift
    shiftKey = 'Night';
    const d = new Date(now.getTime() - 86400000);
    const prev = getPacific(d);
    shiftDate = prev.dateStr;
  }
  return { shiftKey, shiftDate, label: `${shiftKey}  ·  ${shiftDate}` };
}

const shift = computeShift();
document.getElementById('shift-display').innerHTML = `<strong>${shift.label}</strong>`;

// ── Validation ────────────────────────────────────────────────────────────────
function getVal(name) {
  const el = document.querySelector(`input[name="${name}"]:checked`);
  return el ? el.value : null;
}

function validate() {
  let ok = true;
  const fields = {
    'field-quarter':  getVal('quarter'),
    'field-pole':     document.getElementById('pole-location').value.trim(),
    'field-category': getVal('category'),
    'field-count':    document.getElementById('pallet-count').value.trim(),
  };
  Object.entries(fields).forEach(([id, val]) => {
    const el = document.getElementById(id);
    if (!val && val !== 0) { el.classList.add('invalid'); ok = false; }
    else el.classList.remove('invalid');
  });
  return ok ? fields : null;
}

// ── SharePoint submit ─────────────────────────────────────────────────────────
const SP_SITE = 'https://amazon.sharepoint.com/sites/ONT8Quality';
const SP_LIST = 'RTI Singles';

async function getDigest() {
  const r = await fetch(`${SP_SITE}/_api/contextinfo`, {
    method: 'POST',
    headers: {
      'Accept': 'application/json;odata=verbose',
      'Content-Type': 'application/json;odata=verbose'
    },
    credentials: 'include'
  });
  if (!r.ok) throw new Error(`Digest fetch failed: HTTP ${r.status}`);
  const j = await r.json();
  return j?.d?.GetContextWebInformation?.FormDigestValue;
}

async function submitEntry() {
  const fields = validate();
  if (!fields) { showStatus('error', 'Please fill in all required fields.'); return; }

  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.textContent = 'Submitting…';
  hideStatus();

  try {
    const digest = await getDigest();
    if (!digest) throw new Error('Could not authenticate — are you signed into SharePoint?');

    const payload = {
      __metadata:   { type: 'SP.Data.RTI_x0020_SinglesListItem' },
      ShiftDate:    shift.shiftDate + 'T00:00:00Z',
      ShiftKey:     shift.shiftKey,
      Quarter:      fields['field-quarter'],
      PoleLocation: fields['field-pole'],
      Category:     fields['field-category'],
      PalletCount:  parseInt(fields['field-count'], 10),
    };

    const res = await fetch(
      `${SP_SITE}/_api/web/lists/getbytitle('${encodeURIComponent(SP_LIST)}')/items`,
      {
        method: 'POST',
        credentials: 'include',
        headers: {
          'Accept':          'application/json;odata=verbose',
          'Content-Type':    'application/json;odata=verbose',
          'X-RequestDigest': digest,
        },
        body: JSON.stringify(payload),
      }
    );

    if (!res.ok) {
      const errText = await res.text();
      throw new Error(`HTTP ${res.status} — ${errText.slice(0, 300)}`);
    }

    showStatus('success',
      `✓ Submitted: ${fields['field-quarter']} · ${fields['field-pole']} · ` +
      `${fields['field-category']} · ${fields['field-count']} pallets`
    );
    resetForm();

  } catch(e) {
    console.error('[RTI Form]', e);
    showStatus('error', `✗ ${e.message}`);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Submit Entry';
  }
}

function resetForm() {
  document.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
  document.getElementById('pole-location').value = '';
  document.getElementById('pallet-count').value  = '';
  document.querySelectorAll('.field').forEach(f => f.classList.remove('invalid'));
}

function showStatus(type, msg) {
  const el = document.getElementById('status-msg');
  el.className = `status ${type}`;
  el.textContent = msg;
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function hideStatus() {
  const el = document.getElementById('status-msg');
  el.className = 'status';
  el.textContent = '';
}

document.getElementById('btn-submit').addEventListener('click', submitEntry);

document.querySelectorAll('input[type="radio"]').forEach(r => {
  r.addEventListener('change', () => r.closest('.field')?.classList.remove('invalid'));
});
['pole-location', 'pallet-count'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => {
    document.getElementById(id === 'pole-location' ? 'field-pole' : 'field-count')
      .classList.remove('invalid');
  });
});
</script>
</body>
</html>
