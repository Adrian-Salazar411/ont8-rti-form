<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ONT8 — RTI / Singles Entry</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap');

  :root {
    --bg:        #0d1117;
    --surface:   #161b22;
    --border:    #30363d;
    --accent:    #238636;
    --accent-hi: #2ea043;
    --danger:    #da3633;
    --text:      #e6edf3;
    --muted:     #7d8590;
    --label:     #8b949e;
    --input-bg:  #0d1117;
    --radius:    6px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 40px;
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    width: 100%;
    max-width: 480px;
    margin-bottom: 28px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .site-tag {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent-hi);
  }

  .title {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
  }

  /* ── Shift badge ── */
  .shift-badge {
    margin-top: 10px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    width: fit-content;
  }

  .shift-badge .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent-hi);
    flex-shrink: 0;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.35; }
  }

  .shift-badge strong {
    color: var(--text);
    font-weight: 500;
  }

  /* ── Card ── */
  .card {
    width: 100%;
    max-width: 480px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  /* ── Field group ── */
  .field {
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
  }
  .field:last-child { border-bottom: none; }

  .field label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--label);
    margin-bottom: 10px;
  }

  .field label .req {
    color: var(--danger);
    margin-left: 2px;
  }

  /* ── Choice pills ── */
  .pills {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .pill input[type="radio"] {
    display: none;
  }

  .pill label {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px 18px;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s ease;
    letter-spacing: 0;
    text-transform: none;
    margin-bottom: 0;
    min-width: 60px;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .pill input[type="radio"]:checked + label {
    background: var(--accent);
    border-color: var(--accent-hi);
    color: #fff;
  }

  .pill label:active {
    transform: scale(0.96);
  }

  /* ── Text input ── */
  .text-input {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
    appearance: none;
  }

  .text-input:focus {
    border-color: var(--accent-hi);
  }

  .text-input::placeholder {
    color: var(--border);
  }

  /* number input — hide spinners */
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
  input[type="number"] { -moz-appearance: textfield; }

  /* ── Submit button ── */
  .submit-wrap {
    width: 100%;
    max-width: 480px;
    margin-top: 16px;
  }

  .btn-submit {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
    letter-spacing: 0.02em;
  }

  .btn-submit:active { transform: scale(0.98); }
  .btn-submit:disabled {
    background: var(--border);
    color: var(--muted);
    cursor: not-allowed;
    transform: none;
  }

  /* ── Status messages ── */
  .status {
    width: 100%;
    max-width: 480px;
    margin-top: 12px;
    padding: 14px 16px;
    border-radius: var(--radius);
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    display: none;
    line-height: 1.5;
  }

  .status.success {
    background: #0f2a1a;
    border: 1px solid var(--accent);
    color: #3fb950;
    display: block;
  }

  .status.error {
    background: #2a0f0f;
    border: 1px solid var(--danger);
    color: #f85149;
    display: block;
  }

  /* ── Validation highlight ── */
  .field.invalid .text-input { border-color: var(--danger); }
  .field.invalid .pills .pill label { border-color: var(--danger); }

  /* ── Footer ── */
  .footer {
    margin-top: 32px;
    font-size: 11px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em;
    text-align: center;
  }
</style>
</head>
<body>

<div class="header">
  <span class="site-tag">ONT8 · IXD Quality</span>
  <h1 class="title">RTI / Singles Entry</h1>
  <div class="shift-badge">
    <span class="dot"></span>
    <span id="shift-display">Computing shift…</span>
  </div>
</div>

<div class="card">

  <!-- Quarter -->
  <div class="field" id="field-quarter">
    <label>Quarter <span class="req">*</span></label>
    <div class="pills">
      <div class="pill"><input type="radio" name="quarter" id="q1" value="Q1"><label for="q1">Q1</label></div>
      <div class="pill"><input type="radio" name="quarter" id="q2" value="Q2"><label for="q2">Q2</label></div>
      <div class="pill"><input type="radio" name="quarter" id="q3" value="Q3"><label for="q3">Q3</label></div>
      <div class="pill"><input type="radio" name="quarter" id="q4" value="Q4"><label for="q4">Q4</label></div>
    </div>
  </div>

  <!-- Pole Location -->
  <div class="field" id="field-pole">
    <label>Pole Location <span class="req">*</span></label>
    <input class="text-input" type="text" id="pole-location"
           placeholder="e.g. H09, Lane 214, K17…"
           autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false">
  </div>

  <!-- Category -->
  <div class="field" id="field-category">
    <label>Category <span class="req">*</span></label>
    <div class="pills">
      <div class="pill"><input type="radio" name="category" id="cat-rti"     value="RTI"    ><label for="cat-rti"    >RTI</label></div>
      <div class="pill"><input type="radio" name="category" id="cat-ar"      value="AR"     ><label for="cat-ar"     >AR</label></div>
      <div class="pill"><input type="radio" name="category" id="cat-singles" value="Singles"><label for="cat-singles">Singles</label></div>
    </div>
  </div>

  <!-- Pallet Count -->
  <div class="field" id="field-count">
    <label>Pallet Count <span class="req">*</span></label>
    <input class="text-input" type="number" id="pallet-count"
           placeholder="0" min="0" inputmode="numeric">
  </div>

</div>

<div class="submit-wrap">
  <button class="btn-submit" id="btn-submit">Submit Entry</button>
</div>

<div class="status" id="status-msg"></div>

<div class="footer">Submissions go directly to the RTI Singles list</div>

<script>
// ── Config ───────────────────────────────────────────────────
const SP_SITE = 'https://amazon.sharepoint.com/sites/ONT8Quality';
const SP_LIST = 'RTI Singles';

// ── Shift date / key logic (mirrors qrPilesGetShiftDate) ─────
// Night shift: 17:00 PST → 03:30 PST next day
// If current Pacific hour < 17 we're still on last night's shift date
function getPacificNow() {
  const now = new Date();
  const laStr = now.toLocaleString('en-US', {
    timeZone: 'America/Los_Angeles',
    hour12: false,
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit'
  });
  const m = laStr.match(/(\d{2})\/(\d{2})\/(\d{4}),?\s*(\d{2}):(\d{2})/);
  if (!m) return { dateStr: now.toISOString().slice(0, 10), hour: 12, minute: 0 };
  let hour = parseInt(m[4]); if (hour === 24) hour = 0;
  return {
    dateStr: `${m[3]}-${m[1]}-${m[2]}`,
    hour,
    minute: parseInt(m[5])
  };
}

function computeShift() {
  const { dateStr, hour } = getPacificNow();
  // Before 06:00 = still on last night's shift
  // 06:00–16:59 = day shift (today)
  // 17:00–23:59 = night shift (tonight)
  let shiftKey, shiftDate, label;

  if (hour >= 17) {
    shiftKey  = 'Night';
    shiftDate = dateStr;
    label     = `Night  ·  ${dateStr}`;
  } else if (hour >= 6) {
    shiftKey  = 'Day';
    shiftDate = dateStr;
    label     = `Day  ·  ${dateStr}`;
  } else {
    // post-midnight → last night's shift
    shiftKey  = 'Night';
    const d   = new Date(dateStr + 'T12:00:00Z');
    d.setUTCDate(d.getUTCDate() - 1);
    shiftDate = d.toISOString().slice(0, 10);
    label     = `Night  ·  ${shiftDate}`;
  }
  return { shiftKey, shiftDate, label };
}

const shift = computeShift();
document.getElementById('shift-display').innerHTML =
  `<strong>${shift.label}</strong>`;

// ── Validation ───────────────────────────────────────────────
function getVal(name) {
  const el = document.querySelector(`input[name="${name}"]:checked`);
  return el ? el.value : null;
}

function validate() {
  let ok = true;
  const fields = {
    'field-quarter':  getVal('quarter'),
    'field-pole':     document.getElementById('pole-location').value.trim(),
    'field-category': getVal('category'),
    'field-count':    document.getElementById('pallet-count').value.trim(),
  };
  Object.entries(fields).forEach(([id, val]) => {
    const el = document.getElementById(id);
    if (!val && val !== 0) { el.classList.add('invalid'); ok = false; }
    else el.classList.remove('invalid');
  });
  return ok ? fields : null;
}

// ── SharePoint request digest ────────────────────────────────
async function getDigest() {
  const r = await fetch(`${SP_SITE}/_api/contextinfo`, {
    method: 'POST',
    headers: { 'Accept': 'application/json;odata=verbose',
               'Content-Type': 'application/json;odata=verbose' },
    credentials: 'include'
  });
  const j = await r.json();
  return j?.d?.GetContextWebInformation?.FormDigestValue;
}

// ── Submit ───────────────────────────────────────────────────
async function submitEntry() {
  const fields = validate();
  if (!fields) {
    showStatus('error', 'Please fill in all required fields.');
    return;
  }

  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.textContent = 'Submitting…';
  hideStatus();

  try {
    const digest = await getDigest();
    if (!digest) throw new Error('Could not get request digest — are you signed into SharePoint?');

    const payload = {
      __metadata:   { type: 'SP.Data.RTI_x0020_SinglesListItem' },
      ShiftDate:    shift.shiftDate + 'T00:00:00Z',
      ShiftKey:     shift.shiftKey,
      Quarter:      fields['field-quarter'],
      PoleLocation: fields['field-pole'],
      Category:     fields['field-category'],
      PalletCount:  parseInt(fields['field-count'], 10),
    };

    const res = await fetch(
      `${SP_SITE}/_api/web/lists/getbytitle('${encodeURIComponent(SP_LIST)}')/items`,
      {
        method: 'POST',
        credentials: 'include',
        headers: {
          'Accept':          'application/json;odata=verbose',
          'Content-Type':    'application/json;odata=verbose',
          'X-RequestDigest': digest,
        },
        body: JSON.stringify(payload),
      }
    );

    if (!res.ok) {
      const errText = await res.text();
      throw new Error(`HTTP ${res.status} — ${errText.slice(0, 200)}`);
    }

    // Success — reset form, keep shift badge
    showStatus('success',
      `✓ Submitted: ${fields['field-quarter']} · ${fields['field-pole']} · ` +
      `${fields['field-category']} · ${fields['field-count']} pallets`
    );
    resetForm();

  } catch(e) {
    console.error('[RTI Form]', e);
    showStatus('error', `✗ Submission failed: ${e.message}`);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Submit Entry';
  }
}

function resetForm() {
  document.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
  document.getElementById('pole-location').value = '';
  document.getElementById('pallet-count').value  = '';
  document.querySelectorAll('.field').forEach(f => f.classList.remove('invalid'));
}

function showStatus(type, msg) {
  const el = document.getElementById('status-msg');
  el.className = `status ${type}`;
  el.textContent = msg;
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function hideStatus() {
  const el = document.getElementById('status-msg');
  el.className = 'status';
  el.textContent = '';
}

document.getElementById('btn-submit').addEventListener('click', submitEntry);

// Clear invalid state on interaction
document.querySelectorAll('input[type="radio"]').forEach(r => {
  r.addEventListener('change', () => {
    const field = r.closest('.field');
    if (field) field.classList.remove('invalid');
  });
});
['pole-location', 'pallet-count'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => {
    document.getElementById(
      id === 'pole-location' ? 'field-pole' : 'field-count'
    ).classList.remove('invalid');
  });
});
</script>
</body>
</html>
